{% extends "base.html" %}

{% block title %}Página Não Encontrada - ReciclaTech{% endblock %}

{% block extra_css %}
<style>
.pagina-404 {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 200px);
    background: linear-gradient(135deg, #0a2e1f 0%, #0f5132 100%);
    padding: 40px 20px;
}

.container-404 {
    text-align: center;
    background: rgba(30, 30, 30, 0.6);
    backdrop-filter: blur(10px);
    padding: 60px 40px;
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    max-width: 500px;
    border-top: 6px solid #20c997;
}

.numero-404 {
    font-size: 120px;
    font-weight: 900;
    color: #20c997;
    text-shadow: 0 4px 20px rgba(32, 201, 151, 0.3);
    margin-bottom: 20px;
    line-height: 1;
}

.container-404 p {
    font-size: 18px;
    color: #b0b0b0;
    margin-bottom: 40px;
    line-height: 1.6;
}

.btn-voltar {
    display: inline-block;
    padding: 14px 32px;
    background-color: #20c997;
    color: black;
    border-radius: 8px;
    font-weight: 600;
    transition: 0.3s;
    text-decoration: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
}

.btn-voltar:hover {
    background-color: #17a589;
    transform: scale(1.05);
}

@media (max-width: 480px) {
    .container-404 {
        padding: 40px 25px;
    }

    .numero-404 {
        font-size: 80px;
    }

    .container-404 p {
        font-size: 16px;
    }

    .btn-voltar {
        padding: 12px 24px;
        font-size: 14px;
    }
}
</style>
{% endblock %}

{% block content %}

<main class="pagina-404">
    <div class="container-404">
        <div class="numero-404">404</div>
        <p>Desculpe, a página que procura não existe ou foi removida.</p>
        <a href="/" class="btn-voltar">Voltar para o início</a>
    </div>
</main>

{% endblock %}
