<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mapa interativo para pesquisa de locais, visualização de pontos de recolha de resíduos e planeamento de rotas em Portugal.">
    <title>Mapa</title>
    <link rel="preload" href="style.css" as="style">
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <main id="main-content">
    <button popovertarget="sidebar" id="open-sidebar-btn" class="sidebar-btn">☰</button>
    <div id="sidebar" popover>
        <div id="sidebar-header"> 
            <h1 class="sidebar-header-label">Menu</h1>
            <button popovertarget="sidebar" popovertargetaction="hide" id="minimize-sidebar-btn" class="sidebar-btn">☰</button>
        </div>
            
        <div class="sidebar-tabs">
            <div class="tab-bar">
                <input type="radio" name="tab-radio" id="tab-pesquisa" class="tab-radio" checked>
                <label for="tab-pesquisa" class="tab-label">Pesquisa</label>
                <input type="radio" name="tab-radio" id="tab-filtros" class="tab-radio">
                <label for="tab-filtros" class="tab-label">Filtros</label>
                <input type="radio" name="tab-radio" id="tab-pontos" class="tab-radio">
                <label for="tab-pontos" class="tab-label">Pontos</label>
                <input type="radio" name="tab-radio" id="tab-rotas" class="tab-radio">
                <label for="tab-rotas" class="tab-label">Rotas</label>
            </div>

            <div class="tab-content tab-pesquisa-content">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Pesquisar..." autocomplete="off">
                    <button id="search-submit-btn">Buscar</button>
                </div>

                <div id="suggestions-container" class="suggestions-container hidden">
                    <ul id="suggestions-list" class="suggestions-list"></ul>
                </div>

                <label for="search-type-filter" class="label-search-type-filter">Filtrar tipo de pesquisa</label>
                <select id="search-type-filter">
                    <option value="">Todos os tipos</option>
                    <option value="city">Cidade</option>
                    <option value="town">Vila</option>
                    <option value="village">Aldeia</option>
                    <option value="suburb">Subúrbio</option>
                    <option value="street">Rua</option>
                    <option value="amenity">Serviço</option>
                    <option value="tourism">Turismo</option>
                </select>

                <button id="locate-me-btn">Localizar-me</button>

                <div id="results" class="results-list"></div>
            </div>

            <div id="filters" class="tab-content tab-filtros-content">
                <h3>Mostrar no mapa</h3>
                <div class="filter-group">
                    <label class="filter-item"><input type="checkbox" data-css-var="marker-recolha" checked> Pontos de recolha</label>
                    <label class="filter-item"><input type="checkbox" data-css-var="marker-search" checked> Resultados de pesquisa</label>
                    <label class="filter-item"><input type="checkbox" data-css-var="marker-manual" checked> Pontos marcados</label>
                    <label class="filter-item"><input type="checkbox" data-css-var="marker-location" checked> Minha localização</label>
                </div>

                <h3>Visualizações</h3>
                <div class="filter-group">
                    <label class="filter-item"><input type="checkbox" data-css-var="leaflet-geo-pane" checked> Mostrar áreas</label>
                    <label class="filter-item"><input type="checkbox" data-css-var="route-polyline" checked> Mostrar rotas</label>
                    <label class="filter-item"><input type="checkbox" data-css-var="map-label" checked> Mostrar etiqueta de rota</label>
                    <label class="filter-item"><input type="checkbox" data-css-var="show-markers" checked> Mostrar marcadores</label>
                </div>

                <h3>Região</h3>
                <div class="filter-group">
                    <label class="filter-item"><input type="checkbox" id="modo-breno-checkbox"> Apenas Lisboa</label>
                </div>

                <h3>Tipos de Resíduos</h3>
                
                <h4 class="residuo-category-title">Eletrônicos</h4>
                <div class="filter-group" id="residuos-filters-eletronicos">
                    <p class="loading-placeholder">A carregar tipos disponíveis...</p>
                </div>

                <h4 class="residuo-category-title">Gerais</h4>
                <div class="filter-group" id="residuos-filters-gerais">
                    <p class="loading-placeholder">A carregar tipos disponíveis...</p>
                </div>
            </div>

            <div class="tab-content tab-pontos-content">
                <div id="all-points-list" class="results-list"></div>
            </div>

            <div class="tab-content tab-rotas-content">
                <div class="route-endpoints">
                    <div class="route-endpoint-item">
                        <strong class="route-label">Origem:</strong>
                        <div id="route-origin-display">Não definida</div>
                    </div>
                    <div class="route-endpoint-item">
                        <strong class="route-label">Destino:</strong>
                        <div id="route-destination-display">Não definida</div>
                    </div>
                </div>
                <div class="route-actions">
                    <button id="route-swap-btn">⇄ Trocar</button>
                    <button id="route-use-location-btn">Usar Localização</button>
                </div>

                <div id="route-steps"></div>
            </div>
        </div>
    </div>

    <div class="context-menu" id="context-menu">
        <button class="context-item" id="ctx-mark">Marcar ponto</button>
        <button class="context-item" id="ctx-details">Ver detalhes</button>
        <button class="context-item" id="ctx-nearby">Pontos de Recolha Próximos</button>
        <button class="context-item" id="ctx-origin">Definir como origem</button>
        <button class="context-item" id="ctx-destination">Definir como destino</button>
    </div>

    <div id="map"></div>
    <div class="leaflet-control-attribution leaflet-control leaflet-control-attribution-author" title="Desenvolvido por Tiago Guerreiro">
        © <a href="https://github.com/Tiago-Daniel-Guerreiro" target="_blank"><strong>by Tiago Guerreiro</strong></a>
    </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.1/dist/leaflet.markercluster.js"></script>

    <script>
        // Configurar caminhos padrão do Leaflet para os ícones locais
        L.Icon.Default.prototype.options.iconUrl = './icons/marker-icon.svg';
        L.Icon.Default.prototype.options.shadowUrl = './icons/marker-shadow.svg';
    </script>

    <script src="Utils/CategoryCatalog.js" defer></script>
    <script src="Utils/Format.js" defer></script>
    <script src="Utils/Modal.js" defer></script>
    <script src="Utils/ModalRenderer.js" defer></script>
    <script src="Utils/Utils.js" defer></script>

    <script src="Initialization/Constants.js" defer></script>
    <script src="Initialization/Map.js" defer></script>
    <script src="Initialization/ModoBreno.js" defer></script>
    
    <script src="Generic_Api/ApiClient.js" defer></script>
    <script src="Generic_Api/ApiService.js" defer></script>

    <script src="Pontos_Recolha/RecolhaAPI.js" defer></script>
    <script src="Pontos_Recolha/RecolhaMarker.js" defer></script>
    <script src="Pontos_Recolha/RecolhaFilter.js" defer></script>
    <script src="Pontos_Recolha/RecolhaManager.js" defer></script>

    <script src="Pontos_Manuais/PontosStorage.js" defer></script>
    <script src="Pontos_Manuais/PontosMarker.js" defer></script>
    <script src="Pontos_Manuais/PontosManager.js" defer></script>

    <script src="Search/SearchSuggestions.js" defer></script>
    <script src="Search/SearchResults.js" defer></script>
    <script src="Search/Search.js" defer></script>

    <script src="Routes/RoutesData.js" defer></script>
    <script src="Routes/RoutesRenderer.js" defer></script>
    <script src="Routes/RoutesMapDrawer.js" defer></script>
    <script src="Routes/Routes.js" defer></script>

    <script src="Interface/Sidebar.js" defer></script>
    <script src="Interface/ContextMenu.js" defer></script>
    <script src="Interface/Detalhes.js" defer></script>
    <script src="Interface/NearbyPoints.js" defer></script>
    <script src="Interface/PlaceRenderer.js" defer></script>
    <script src="Interface/PointsList.js" defer></script>

    <script src="Initialization/App.js" defer></script>
</body>
</html>
