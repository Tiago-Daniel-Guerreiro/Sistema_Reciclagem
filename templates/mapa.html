{% extends "base.html" %}

{% block title %}Mapa - ReciclaTech{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/css/mapa.css">
{% endblock %}

{% block content %}

<main class="page-main">
    <h1 class="page-title">Mapa de Pontos de Recolha</h1>
    <p class="page-subtitle">
        Explore os locais onde pode descartar corretamente o lixo eletrónico.
    </p>

    <div class="map-wrapper" id="mapWrapper">
        <div class="map-header" id="mapHeader" style="display: none;">
            <h1 class="map-header-title">Mapa Maximizado</h1>
            <button class="map-btn map-btn-small" id="btnExitMaximize" title="Sair de maximização">✕ Sair</button>
        </div>
        <iframe
            src="/map/"
            title="Mapa interativo ReciclaTech"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            allowfullscreen>
        </iframe>
    </div>

    <div class="map-controls">
        <button class="map-btn" id="btnMaximize" title="Maximizar mapa">Maximizar</button>
        <button class="map-btn" id="btnFullscreen" title="Tela cheia">Tela Cheia</button>
    </div>
</main>

<script>
    const btnMaximize = document.getElementById('btnMaximize');
    const btnFullscreen = document.getElementById('btnFullscreen');
    const btnExitMaximize = document.getElementById('btnExitMaximize');
    const mapWrapper = document.getElementById('mapWrapper');
    const mapHeader = document.getElementById('mapHeader');
    const iframeMap = mapWrapper.querySelector('iframe');

    // Tela cheia
    btnFullscreen.addEventListener('click', async () => {
        try {
            if (iframeMap.requestFullscreen) await iframeMap.requestFullscreen();
            else if (iframeMap.webkitRequestFullscreen) await iframeMap.webkitRequestFullscreen();
            else if (iframeMap.mozRequestFullscreen) await iframeMap.mozRequestFullscreen();
            else if (iframeMap.msRequestFullscreen) await iframeMap.msRequestFullscreen();
        } catch (err) {
            console.error(`Fullscreen error: ${err.message}`);
        }
    });

    // Maximizar
    btnMaximize.addEventListener('click', () => {
        mapWrapper.classList.add('maximized');
        mapHeader.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    });

    // Sair do modo maximizado
    btnExitMaximize.addEventListener('click', () => {
        mapWrapper.classList.remove('maximized');
        mapHeader.style.display = 'none';
        document.body.style.overflow = 'auto';
    });

    // Sair com ESC
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && mapWrapper.classList.contains('maximized')) {
            mapWrapper.classList.remove('maximized');
            mapHeader.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    });
</script>
{% endblock %}
