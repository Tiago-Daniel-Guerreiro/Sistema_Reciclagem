{% extends "base.html" %}

{% block title %}Mapa - ReciclaTech{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/css/mapa.css">
{% endblock %}

{% block content %}

<main class="page-main">
    <h1 class="page-title">Mapa de Pontos de Recolha</h1>
    <p class="page-subtitle">
        Explore os locais onde pode descartar corretamente o lixo eletrónico.
    </p>

    <div class="map-wrapper" id="mapWrapper">
        <iframe
            src="/map/"
            title="Mapa interativo ReciclaTech"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </div>

    <div class="map-controls">
        <button class="map-btn" id="btnMaximize" title="Maximizar mapa">Maximizar</button>
        <button class="map-btn" id="btnFullscreen" title="Tela cheia">Tela Cheia</button>
    </div>
</main>

<div class="maximize-mode" id="maximizeMode">
    <div class="maximize-header">
        <h1 class="maximize-title">Mapa Maximizado</h1>
        <button class="map-btn" id="btnExitMaximize" title="Sair de maximização">✕ Sair</button>
    </div>
    <div class="maximize-map">
        <iframe src="/map/" title="Mapa maximizado" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
</div>

<script>
    const btnMaximize = document.getElementById('btnMaximize');
    const btnFullscreen = document.getElementById('btnFullscreen');
    const btnExitMaximize = document.getElementById('btnExitMaximize');
    const maximizeMode = document.getElementById('maximizeMode');

    // Maximizar
    btnMaximize.addEventListener('click', () => {
        maximizeMode.classList.add('active');
        document.body.style.overflow = 'hidden';
    });

    // Tela cheia
    btnFullscreen.addEventListener('click', async () => {
        const mapWrapper = document.getElementById('mapWrapper');
        try {
            switch (true) {
                case mapWrapper.requestFullscreen: await mapWrapper.requestFullscreen(); break;
                case mapWrapper.webkitRequestFullscreen: await mapWrapper.webkitRequestFullscreen(); break;
                case mapWrapper.mozRequestFullScreen: await mapWrapper.mozRequestFullScreen(); break;
                case mapWrapper.msRequestFullscreen: await mapWrapper.msRequestFullscreen(); break;
            }
        } catch (err) {
            console.error(`Error attempting to enable fullscreen: ${err.message}`);
        }
    });

    // Sair do modo maximizado
    btnExitMaximize.addEventListener('click', () => {
        maximizeMode.classList.remove('active');
        document.body.style.overflow = 'auto';
    });

    // Sair com ESC
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && maximizeMode.classList.contains('active')) {
            maximizeMode.classList.remove('active');
            document.body.style.overflow = 'auto';
        }
    });
</script>
{% endblock %}
